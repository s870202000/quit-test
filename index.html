<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>【VOGUE 職涯評鑑】重塑你的職涯邊際</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F172A;
            --accent: #C5A059;
            --bg-light: #F8FAFC;
            --font-vogue: 'Playfair Display', 'Noto Serif TC', serif;
            --font-body: 'Montserrat', 'Noto Sans TC', sans-serif;
        }

        /* 全域樣式 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: var(--primary) !important; color: white; min-height: 100vh; }
        body { font-family: var(--font-body); font-weight: 300; line-height: 1.6; letter-spacing: 0.05em; }

        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }

        /* 首頁設計：修復重疊問題 */
        .hero-section {
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(197, 160, 89, 0.2);
            background: linear-gradient(180deg, rgba(15,23,42,1) 0%, rgba(26,39,68,1) 100%);
        }

        .hero-sub { font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
        
        .hero-title {
            font-family: var(--font-vogue);
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-style: italic;
            color: var(--accent) !important;
            line-height: 1.2;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }

        .btn-vogue {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 16px 48px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-vogue:hover { background: var(--accent); color: var(--primary); box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        /* 測驗卡片 */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .quiz-card {
            background: white;
            color: var(--primary);
            padding: 40px 30px;
            text-align: left;
            margin-top: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-left: 6px solid var(--accent);
        }

        .quiz-q { font-family: var(--font-body); font-size: 1.2rem; font-weight: 400; margin-bottom: 30px; color: var(--primary); }

        .option-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            border: 1px solid #e2e8f0; background: white; text-align: left;
            font-family: var(--font-body); font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease;
        }
        .option-btn:hover { border-color: var(--accent); color: var(--accent); padding-left: 25px; }

        /* 結果頁 */
        .score-circle { font-size: 90px; font-family: var(--font-vogue); color: var(--accent); font-weight: 700; margin: 20px 0; }
        .dimension-row { margin-bottom: 30px; text-align: left; }
        .dimension-label { font-size: 0.75rem; color: rgba(255,255,255,0.7); display: flex; justify-content: space-between; margin-bottom: 8px; letter-spacing: 0.1em; }
        .bar-bg { height: 2px; background: rgba(255,255,255,0.1); width: 100%; }
        .bar-fill { height: 100%; background: var(--accent); transition: width 1.5s ease; }

        .vip-invite {
            margin-top: 60px; padding: 40px; border: 1px solid var(--accent); background: rgba(197, 160, 89, 0.03);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Welcome -->
    <div id="view-welcome" class="view-section active">
        <div class="hero-section">
            <div class="hero-sub">Vogue Career Assessment</div>
            <h1 class="hero-title">重塑你的職涯邊際</h1>
            <button class="btn-vogue" onclick="startQuiz()">開啟專屬評鑑</button>
        </div>
    </div>

    <!-- 2. Quiz -->
    <div id="view-quiz" class="view-section">
        <div id="indicator" style="color: var(--accent); letter-spacing: 4px; font-size: 12px; margin-bottom: 10px;">INDICATOR 01/12</div>
        <div class="quiz-card">

            <div id="options"></div>

        </div>
    </div>

    <!-- 3. Result -->
    <div id="view-result" class="view-section">
        <h4 style="letter-spacing: 6px; font-weight: 300; font-size: 14px; opacity: 0.6;">CAREER HEALTH INDEX</h4>
        <div class="score-circle" id="total-score">0</div>
        <div id="res-status" style="color: var(--accent); font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 20px;">分析中...</div>

        <div id="analysis-box"></div>

        <div class="vip-invite">
            <h2 style="font-family: var(--font-vogue); color: var(--accent); margin-bottom: 20px; font-style: italic;">專屬職涯顧問晤談</h2>
            <p style="margin-bottom: 30px; font-size: 0.9rem; opacity: 0.7;">針對您的數據結果，進行深度一對一策略佈局。</p>
            <button class="btn-vogue" style="background: var(--accent); color: var(--primary);" onclick="window.location.href='https://lin.ee/xxxxxxxxxx'">立即預約</button>
        </div>
        <p style="margin-top: 50px;"><a href="javascript:location.reload()" style="color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 2px; text-decoration: none;">RE-START ASSESSMENT</a></p>
    </div>
</div>
